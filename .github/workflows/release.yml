name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build generic zip (Manus, ChatGPT, Cursor, etc.)
        run: |
          cp -r skills/youtube-downloader youtube-downloader
          sed -i 's|\${CLAUDE_SKILL_DIR}/||g' youtube-downloader/SKILL.md
          zip -r "youtube-downloader.zip" youtube-downloader/
          rm -rf youtube-downloader

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            youtube-downloader.zip
